<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

<title>Quality Care - Care & Support Worker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--cream:#FBFFF0;
--pink:#d6b0bf;
--dark:#555;
--white:#fff;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Nunito',sans-serif;background:var(--cream);color:var(--dark);line-height:1.6}
.container{width:min(1100px,95%);margin:auto}
header{padding:20px 2px;text-align:center}
.logo{font-size:3rem;font-weight:800}
.tagline{font-size:2.2rem;margin:20px 0}
.coverage{font-size:1.7rem;margin:20px 0}
.sub{font-size:1.4rem}
.btn{display:inline-block;background:var(--pink);padding:14px 28px;border-radius:8px;color:white;text-decoration:none;font-weight:bold;margin-top:20px}
.section{padding:40px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.card{background:white;padding:30px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
h2{text-align:center;font-size:2rem;margin-bottom:30px}
.testimonials{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.testimonial{background:white;padding:25px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.contact-form{background:white;padding:30px;border-radius:14px;max-width:700px;margin:auto}
input,textarea{width:100%;padding:12px;margin:8px 0 16px;border:1px solid #ccc;border-radius:8px}
button{background:var(--pink);color:white;border:none;padding:14px 24px;border-radius:8px;font-size:1rem}
.cta{text-align:center;background:var(--pink);color:white;padding:50px 20px}
footer{text-align:center;padding:40px 20px}
@media(max-width:768px){
.grid{grid-template-columns:1fr}
.tagline{font-size:1.7rem}
}
</style>
</head>
<body>

<header>
<div class="container">
<img class="img-fluid" src="header.png">
<div class="tagline">Thank you, your enquiry has been sent</div>
<div class="coverage">I will get back to you as soon as possible</div>
<div class="sub"> </div>
<a href="index.html" class="btn">Return to Site</a>
</div>
</header>

</body>
</html>
